<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Online Nodes</title>

    <meta http-equiv="refresh" content="30">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="navbar">

        <div class="nav-title">
            Online Nodes
        </div>

        <div class="nav-links">

            <a href="/">Dashboard</a>

            <a href="/history">History</a>

        </div>

    </div>

    <div class="container">

        <div class="card">

            <h2>Online Servers</h2>

            <table>

                <tr>
                    <th>Hostname</th>
                    <th>IP</th>
                    <th>OS</th>
                    <th>Uptime</th>
                    <th>Updates</th>
                    <th>Status</th>
                </tr>

                {% for server in servers %}

                <tr>

                    <td>
    			<a href="/node/{{ server.hostname }}"
       			   class="node-link">

        			 {{ server.hostname }}

    			</a>
		    </td>

                    <td>{{ server.ip }}</td>

                    <td>{{ server.os }}</td>

                    <td>{{ server.uptime }}</td>

                    <td>{{ server.updates }}</td>

                    <td>{{ server.status }}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>

</html>
